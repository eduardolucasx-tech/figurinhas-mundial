<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f7a4f" />
  <title>Checklist Mundial</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CM</div>
        <div>
          <h1>Checklist Mundial</h1>
          <p>gerenciador de figurinhas</p>
        </div>
      </div>
      <nav class="nav" aria-label="Navegação principal">
        <button class="nav-item active" data-view="album">Álbum</button>
        <button class="nav-item" data-view="adicionar">Adicionar</button>
        <button class="nav-item" data-view="listas">Buscar</button>
        <button class="nav-item" data-view="trocas">Trocas</button>
        <button class="nav-item" data-view="mapa">Mapa</button>
        <button class="nav-item" data-view="dashboard">Resumo</button>
        <button class="nav-item" data-view="config">Conta</button>
      </nav>
      <div class="side-card">
        <span class="label">Progresso</span>
        <strong id="sideProgress">0%</strong>
        <div class="mini-bar"><span id="sideProgressBar"></span></div>
        <p id="sideSync" class="side-sync">Modo local</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Álbum de seleções 2026</p>
          <h2 id="viewTitle">Álbum</h2>
        </div>
        <div class="top-actions">
          <span id="syncBadge" class="sync-badge offline">Modo local</span>
          <button class="ghost" id="installBtn" hidden>Instalar app</button>
          <button class="ghost" id="syncNowBtn" title="Sincronizar agora">Sincronizar agora</button>
          <button class="ghost" id="addTopBtn" title="Adicionar figurinhas">Adicionar</button>
          <button class="primary" id="quickAddBtn">Marcar figurinha</button>
        </div>
      </header>

      <section id="dashboard" class="view"></section>
      <section id="album" class="view active"></section>
      <section id="adicionar" class="view"></section>
      <section id="mapa" class="view"></section>
      <section id="listas" class="view"></section>
      <section id="trocas" class="view"></section>
      <section id="config" class="view"></section>
    </main>
  </div>

  <dialog id="markDialog">
    <form method="dialog" class="dialog-card" id="markForm">
      <div class="dialog-head">
        <h3>Marcar figurinha</h3>
        <button class="icon-btn" value="cancel" aria-label="Fechar">×</button>
      </div>
      <label>Buscar por código, seleção, nome ou status
        <input id="markSearch" type="search" placeholder="Ex: BRA 10, Brasil, falta, repetida" />
      </label>
      <div id="markResults" class="mark-results"></div>
      <menu>
        <button class="ghost" value="cancel">Fechar</button>
      </menu>
    </form>
  </dialog>

  <button id="fabQuickAdd" class="fab" aria-label="Marcar figurinha">+</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
